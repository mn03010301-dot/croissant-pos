<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Croissant POS V3</title><style>body{font-family:Arial;background:#f3e5d0;padding:20px;color:#5b3a29}button{padding:18px;font-size:20px;margin:8px;border:none;border-radius:12px;background:#d9a066;color:white;width:100%}.card{background:#fff8f0;padding:20px;border-radius:18px;margin:15px 0;box-shadow:0 4px 8px rgba(0,0,0,.15)}#total{font-size:36px}#message{font-size:24px;font-weight:bold}</style></head><body><h1>🥐 Croissant Café POS V3</h1><div class='card'><h2>商品選択</h2><button onclick="selectProduct('A',500)">🍓Aセット ¥500</button><button onclick="selectProduct('B',500)">🍫Bセット ¥500</button><button onclick="selectProduct('S',450)">🥐単品 ¥450</button><p id='selected'>商品を選択してください</p></div><div class='card'><h2>会計</h2><input id='received' type='number' placeholder='受け取った金額' style='width:100%;padding:12px;font-size:20px'><button onclick='completeSale()'>会計完了</button><p id='message'></p></div><div class='card'><h2>売上</h2><div id='total'></div><div id='counts'></div></div><div class='card'><h2>履歴</h2><ul id='history'></ul></div><button onclick='resetData()'>営業開始前リセット</button><script>let data=JSON.parse(localStorage.getItem('croissantV3'))||{counts:{A:0,B:0,S:0},total:0,history:[]};let current=null;const names={A:'Aセット',B:'Bセット',S:'単品'};function save(){localStorage.setItem('croissantV3',JSON.stringify(data));}function update(){document.getElementById('total').textContent='総売上 ¥'+data.total;document.getElementById('counts').innerHTML=`A:${data.counts.A}個<br>B:${data.counts.B}個<br>単品:${data.counts.S}個`;let ul=document.getElementById('history');ul.innerHTML='';data.history.slice(-10).reverse().forEach(h=>{let li=document.createElement('li');li.textContent=h;ul.appendChild(li)});save()}function selectProduct(type,price){current={type,price};document.getElementById('selected').textContent=`選択中：${names[type]} ¥${price}`;}function completeSale(){if(!current){alert('商品を選択してください');return;}let received=Number(document.getElementById('received').value);if(!received){alert('受け取った金額を入力してください');return;}if(received<current.price){alert('金額不足です');return;}let change=received-current.price;data.counts[current.type]++;data.total+=current.price;let d=new Date();let t=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');data.history.push(`${t} ${names[current.type]} ¥${current.price}`);document.getElementById('message').textContent=`お釣り：¥${change} ご利用ありがとうございました！`;document.getElementById('received').value='';current=null;document.getElementById('selected').textContent='商品を選択してください';update()}function resetData(){if(confirm('本当にリセットしますか？')){data={counts:{A:0,B:0,S:0},total:0,history:[]};update();}}update();</script></body></html>
